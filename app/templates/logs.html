{% extends "base.html" %}
{% block title %}{{ container_name }} — logstream{% endblock %}

{% block head %}
<style>
  /* Layout */
  .log-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 44px);
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid var(--border-hi);
    background: transparent;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--muted); }

  .container-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* Toolbar */
  .toolbar {
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    padding: 7px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  .filter-input {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border-hi);
    border-radius: 5px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    outline: none;
    width: 200px;
    transition: border-color 0.12s, width 0.2s;
  }
  .filter-input:focus { border-color: var(--amber); width: 280px; }
  .filter-input::placeholder { color: var(--dim); }
  .filter-input.has-value { border-color: var(--amber); color: var(--amber); }

  .tail-input {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border-hi);
    border-radius: 5px;
    padding: 4px 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    outline: none;
    width: 70px;
    text-align: right;
  }
  .tail-input:focus { border-color: var(--amber); }

  .level-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.12s;
    background: transparent;
    color: var(--dim);
    border-color: var(--border);
  }
  .level-btn:hover { color: var(--text); border-color: var(--border-hi); }
  .level-btn.active-err  { color: #fda4af; border-color: #5c1a2a; background: rgba(244,63,94,0.08); }
  .level-btn.active-warn { color: #fde68a; border-color: #78350f; background: rgba(245,158,11,0.08); }
  .level-btn.active-info { color: #7dd3fc; border-color: #0c4a6e; background: rgba(56,189,248,0.08); }
  .level-btn.active-dbg  { color: #d1d5db; border-color: #374151; background: rgba(255,255,255,0.04); }

  .counter {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* Log viewport */
  .log-viewport {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    background: #070707;
    position: relative;
  }
  .log-row {
    display: flex;
    align-items: flex-start;
    border-bottom: 1px solid rgba(255,255,255,0.025);
    transition: background 0.08s;
  }
  .log-row:hover { background: rgba(255,255,255,0.025); }
  .log-row.log-err  { background: rgba(244,63,94,0.04); border-bottom-color: rgba(244,63,94,0.08); }
  .log-row.log-warn { background: rgba(245,158,11,0.04); border-bottom-color: rgba(245,158,11,0.08); }
  .log-row.log-info { background: rgba(56,189,248,0.02); }
  .log-row.log-hidden { display: none; }

  .log-lno {
    flex-shrink: 0;
    width: 56px;
    padding: 3px 12px 3px 16px;
    color: var(--dim);
    text-align: right;
    user-select: none;
    font-size: 10px;
    position: sticky;
    left: 0;
    background: inherit;
  }
  .log-ts {
    flex-shrink: 0;
    width: 80px;
    padding: 3px 12px 3px 0;
    color: var(--dim);
    font-size: 10px;
    user-select: none;
  }
  .log-line {
    flex: 1;
    padding: 3px 16px 3px 0;
    white-space: pre-wrap;
    word-break: break-all;
    min-width: 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
  }
  .log-row.log-err  .log-line { color: #fca5a5; }
  .log-row.log-warn .log-line { color: #fde68a; }
  .log-row.log-info .log-line { color: #bae6fd; }
  .log-row.log-dbg  .log-line { color: #9ca3af; }

  /* highlight search matches */
  .match { background: rgba(245,158,11,0.3); color: var(--amber); border-radius: 2px; }

  .scroll-anchor { flex-shrink: 0; height: 1px; }

  /* Auto-scroll toggle */
  .autoscroll-pill {
    position: absolute;
    bottom: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(10,10,10,0.9);
    border: 1px solid var(--border-hi);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  .autoscroll-pill:hover { border-color: var(--muted); }
  .autoscroll-pill.active { border-color: var(--amber); color: var(--amber); }

  .log-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12px;
    gap: 8px;
    user-select: none;
  }
  .log-empty-icon { font-size: 28px; opacity: 0.3; }
</style>
{% endblock %}

{% block nav_links %}
<a href="/" class="nav-link"><- Back</a>
{% endblock %}

{% block content %}
<div class="log-layout">
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="back-btn" title="Back"><-</a>
      <span class="container-title" title="{{ container_name }}">{{ container_name }}</span>
      <div class="conn-status">
        <span class="dot dot-idle" id="statusDot"></span>
        <span id="statusText">stopped</span>
      </div>
    </div>

    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" id="copyAllBtn" onclick="copyAllLogs()" title="Copy all visible logs">Copy logs</button>
      <button class="btn btn-ghost btn-sm" id="downloadBtn" onclick="downloadLogs()" title="Download logs as .txt">Download</button>
      <button class="btn btn-ghost btn-sm" id="clearBtn" onclick="clearLogs()">Clear</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-live" id="liveBtn" onclick="toggleLive()">Live</button>
    </div>
  </div>

  <div class="toolbar">
    <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)">
      Tail
      <input type="number" id="tailInput" value="100" min="0" max="10000" class="tail-input" />
    </label>

    <div class="toolbar-sep"></div>

    <input type="text" id="filterInput" class="filter-input" placeholder="Filter... (regex)" oninput="applyFilter()" />

    <div class="toolbar-sep"></div>

    <button class="level-btn" id="lvl-err"  onclick="toggleLevel('err')"  title="Toggle errors">ERR</button>
    <button class="level-btn" id="lvl-warn" onclick="toggleLevel('warn')" title="Toggle warnings">WARN</button>
    <button class="level-btn" id="lvl-info" onclick="toggleLevel('info')" title="Toggle info">INFO</button>
    <button class="level-btn" id="lvl-dbg"  onclick="toggleLevel('dbg')"  title="Toggle debug">DEBUG</button>

    <div class="counter" id="lineCounter">0 lines</div>
  </div>

  <div class="log-viewport" id="logViewport">
    <div id="logContainer">
      <div class="log-empty" id="logEmpty">
        <div class="log-empty-icon">[]</div>
        <div>Press Live to start streaming</div>
      </div>
    </div>
    <div class="scroll-anchor" id="scrollAnchor"></div>

    <button class="autoscroll-pill" id="autoscrollPill" onclick="toggleAutoscroll()">
      <span id="autoscrollIcon">v</span>
      <span id="autoscrollLabel">Auto-scroll</span>
    </button>
  </div>
</div>

<script>
const CONTAINER = '{{ container_name }}';
const WS_URL    = '{{ ws_url }}';
let ws          = null;
let liveMode    = false;
let closedByUser = false;
let autoScroll  = true;
let lineCount   = 0;
let levelFilter = new Set();
const MAX_LINES = 5000;
let filterRegex = null;

const logContainer  = document.getElementById('logContainer');
const logEmpty      = document.getElementById('logEmpty');
const scrollAnchor  = document.getElementById('scrollAnchor');
const logViewport   = document.getElementById('logViewport');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const liveBtn       = document.getElementById('liveBtn');
const filterInput   = document.getElementById('filterInput');
const lineCounter   = document.getElementById('lineCounter');
const autoscrollPill = document.getElementById('autoscrollPill');

const ANSI_RE = /\x1B\[[0-9;]*[mGKHF]/g;
function stripAnsi(s) { return s.replace(ANSI_RE, ''); }

function classifyLine(line) {
  const l = line.toLowerCase();
  if (/\b(fatal|critical)\b/.test(l) || /\b(error|err)\b/.test(l) || l.includes('traceback') || l.includes('exception') || / [45]\d\d /.test(line)) return 'err';
  if (/\bwarn(ing)?\b/.test(l)) return 'warn';
  if (/\binfo\b/.test(l) || /\[inf\]/.test(l) || / 2\d\d /.test(line)) return 'info';
  if (/\b(debug|dbg|trace)\b/.test(l)) return 'dbg';
  return '';
}

function renderLine(rawLine) {
  const line = stripAnsi(rawLine);
  if (!line.trim()) return;

  const level = classifyLine(line);
  const ts    = new Date().toISOString().slice(11, 23);

  lineCount++;
  updateCounter();

  const row = document.createElement('div');
  row.className = `log-row${level ? ' log-' + level : ''}`;
  row.dataset.raw = line;
  row.dataset.level = level;

  const lno = document.createElement('span');
  lno.className = 'log-lno';
  lno.textContent = lineCount;

  const tsEl = document.createElement('span');
  tsEl.className = 'log-ts';
  tsEl.textContent = ts;

  const lineEl = document.createElement('span');
  lineEl.className = 'log-line';
  lineEl.textContent = line;

  row.appendChild(lno);
  row.appendChild(tsEl);
  row.appendChild(lineEl);

  applyRowVisibility(row);

  if (logEmpty && logEmpty.parentNode) logEmpty.remove();

  logContainer.appendChild(row);

  const rows = logContainer.querySelectorAll('.log-row');
  if (rows.length > MAX_LINES) {
    rows[0].remove();
  }

  if (autoScroll) logViewport.scrollTop = logViewport.scrollHeight;
}

function applyRowVisibility(row) {
  const level   = row.dataset.level || '';
  const rawText = row.dataset.raw || '';

  let hide = false;
  if (level && levelFilter.has(level)) hide = true;
  if (!hide && filterRegex) {
    hide = !filterRegex.test(rawText);
  }
  row.classList.toggle('log-hidden', hide);

  const lineEl = row.querySelector('.log-line');
  if (lineEl) {
    if (!hide && filterRegex) {
      lineEl.innerHTML = escHtml(rawText).replace(filterRegex, m => `<span class="match">${escHtml(m)}</span>`);
    } else {
      lineEl.textContent = rawText;
    }
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function applyFilter() {
  const val = filterInput.value.trim();
  filterInput.classList.toggle('has-value', !!val);
  try {
    filterRegex = val ? new RegExp(val, 'i') : null;
    filterInput.style.borderColor = val ? 'var(--amber)' : '';
    filterInput.style.color = val ? 'var(--amber)' : '';
  } catch(e) {
    filterRegex = null;
    filterInput.style.borderColor = 'var(--rose)';
    filterInput.style.color = 'var(--rose)';
  }
  logContainer.querySelectorAll('.log-row').forEach(applyRowVisibility);
  updateCounter();
}

function toggleLevel(lvl) {
  if (levelFilter.has(lvl)) levelFilter.delete(lvl);
  else levelFilter.add(lvl);

  const btn = document.getElementById(`lvl-${lvl}`);
  btn.classList.toggle(`active-${lvl}`, !levelFilter.has(lvl));

  logContainer.querySelectorAll('.log-row').forEach(applyRowVisibility);
  updateCounter();
}

function updateCounter() {
  const visible = logContainer.querySelectorAll('.log-row:not(.log-hidden)').length;
  lineCounter.textContent = `${visible.toLocaleString()} / ${lineCount.toLocaleString()} lines`;
}

logViewport.addEventListener('scroll', () => {
  const nearBottom = logViewport.scrollHeight - logViewport.scrollTop - logViewport.clientHeight < 80;
  if (nearBottom !== autoScroll) {
    autoScroll = nearBottom;
    updateAutoscrollPill();
  }
});

function toggleAutoscroll() {
  autoScroll = !autoScroll;
  if (autoScroll) logViewport.scrollTop = logViewport.scrollHeight;
  updateAutoscrollPill();
}

function updateAutoscrollPill() {
  autoscrollPill.classList.toggle('active', autoScroll);
  document.getElementById('autoscrollLabel').textContent = autoScroll ? 'Auto-scroll on' : 'Auto-scroll off';
  document.getElementById('autoscrollIcon').textContent  = autoScroll ? 'v' : '^';
}

function setStatus(state, dot) {
  statusText.textContent = state;
  statusDot.className = 'dot ' + (dot || 'dot-idle');
}

function toggleLive() {
  if (liveMode) stop();
  else startLive();
}

function startLive() {
  liveMode = true;
  closedByUser = false;
  liveBtn.className = 'btn btn-stop';
  liveBtn.textContent = 'Stop';
  document.getElementById('tailInput').disabled = true;
  setStatus('connecting...', 'dot-warn');
  connect();
}

function stop() {
  liveMode = false;
  closedByUser = true;
  liveBtn.className = 'btn btn-live';
  liveBtn.textContent = 'Live';
  document.getElementById('tailInput').disabled = false;
  setStatus('stopped', 'dot-idle');
  if (ws) { try { ws.close(); } catch(e){} }
}

function getKey() {
  return (localStorage.getItem('lg_api_key') || '').trim();
}

function wsUrl() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const tail  = document.getElementById('tailInput').value || 100;
  return `${proto}//${location.host}${WS_URL}?tail=${encodeURIComponent(tail)}`;
}

function connect() {
  if (ws) { try { ws.close(); } catch(e){} }

  const key = getKey();
  if (!key) {
    renderLine('[logstream] Missing API key');
    stop();
    return;
  }

  ws = new WebSocket(wsUrl());

  ws.onopen = () => {
    setStatus('live', 'dot-live');
    ws.send(JSON.stringify({ type: 'auth', token: key, tail: parseInt(document.getElementById('tailInput').value || 100, 10) }));
  };

  ws.onmessage = (ev) => {
    let data;
    try { data = JSON.parse(ev.data); } catch(e) { return; }

    if (data.type === 'error') {
      renderLine(`[logstream] Error: ${data.message || 'unknown error'}`);
      stop();
      return;
    }
    if (data.type === 'log' && typeof data.line === 'string') {
      renderLine(data.line);
    }
  };

  ws.onclose = () => {
    if (!liveMode || closedByUser) { setStatus('stopped', 'dot-idle'); return; }
    setStatus('reconnecting...', 'dot-warn');
    setTimeout(() => { if (liveMode && !closedByUser) connect(); }, 1800);
  };

  ws.onerror = () => setStatus('error', 'dot-error');
}

function getVisibleLogs() {
  const rows = logContainer.querySelectorAll('.log-row:not(.log-hidden)');
  return Array.from(rows).map(r => {
    const ts   = r.querySelector('.log-ts')?.textContent || '';
    const line = r.dataset.raw || '';
    return `${ts} ${line}`;
  }).join('\n');
}

function copyAllLogs() {
  const text = getVisibleLogs();
  if (!text) { toast('No logs to copy', 'error'); return; }
  copyText(text, `${lineCount} lines`);
}

function downloadLogs() {
  const text = getVisibleLogs();
  if (!text) { toast('No logs to download', 'error'); return; }
  const blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${CONTAINER}_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.log`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded logs', 'success');
}

function clearLogs() {
  logContainer.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'log-empty';
  empty.id = 'logEmpty';
  empty.innerHTML = '<div class="log-empty-icon">[]</div><div>Press Live to start streaming</div>';
  logContainer.appendChild(empty);
  lineCount = 0;
  updateCounter();
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    filterInput.focus();
    filterInput.select();
  }
  if (e.key === 'Escape' && document.activeElement === filterInput) {
    filterInput.value = '';
    applyFilter();
    filterInput.blur();
  }
});

updateAutoscrollPill();
if (getKey()) setTimeout(startLive, 200);
</script>
{% endblock %}
